<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسئلة عشوائية</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
}

/* Animated Background */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        45deg,
        #0f0f1e 0%,
        #1a0033 25%,
        #0f0f3e 50%,
        #1a0033 75%,
        #0f0f1e 100%
    );
    background-size: 400% 400%;
    animation: gradientFlow 15s ease infinite;
    z-index: -2;
}

@keyframes gradientFlow {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

/* Floating Particles Background Layer */
body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 204, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(255, 0, 85, 0.05) 0%, transparent 50%);
    background-size: 
        150% 150%,
        200% 200%,
        180% 180%;
    background-position: 
        0% 0%,
        100% 100%,
        50% 50%;
    animation: 
        particleFloat1 20s ease-in-out infinite,
        particleFloat2 25s ease-in-out infinite,
        particleFloat3 30s ease-in-out infinite;
    z-index: -1;
    pointer-events: none;
}

@keyframes particleFloat1 {
    0%, 100% {
        background-position: 0% 0%, 100% 100%, 50% 50%;
    }
    50% {
        background-position: 100% 100%, 0% 0%, 50% 50%;
    }
}

@keyframes particleFloat2 {
    0%, 100% {
        background-position: 0% 0%, 100% 100%, 50% 50%;
    }
    50% {
        background-position: 50% 50%, 50% 50%, 100% 0%;
    }
}

@keyframes particleFloat3 {
    0%, 100% {
        background-position: 0% 0%, 100% 100%, 50% 50%;
    }
    50% {
        background-position: 100% 0%, 0% 100%, 0% 100%;
    }
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 800px;
    gap: 30px;
    position: relative;
    z-index: 10;
}

/* Animated Floating Orbs */
.container::before {
    content: '';
    position: fixed;
    top: 10%;
    left: 5%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 255, 204, 0.2), transparent 70%);
    border-radius: 50%;
    filter: blur(60px);
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
}

.container::after {
    content: '';
    position: fixed;
    bottom: 10%;
    right: 5%;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle at 30% 30%, rgba(0, 255, 136, 0.15), transparent 70%);
    border-radius: 50%;
    filter: blur(50px);
    animation: float 10s ease-in-out infinite reverse;
    pointer-events: none;
    z-index: 1;
}

@keyframes float {
    0%, 100% {
        transform: translate(0, 0);
    }
    25% {
        transform: translate(30px, -40px);
    }
    50% {
        transform: translate(-20px, 50px);
    }
    75% {
        transform: translate(40px, 20px);
    }
}

.header {
    text-align: center;
    margin-bottom: 10px;
    position: relative;
    z-index: 20;
}

.header h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg, #00ffff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
    font-weight: 700;
    animation: titleGlow 3s ease-in-out infinite;
}

@keyframes titleGlow {
    0%, 100% {
        text-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
    }
    50% {
        text-shadow: 0 0 30px rgba(0, 255, 255, 0.6), 0 0 60px rgba(0, 255, 136, 0.3);
    }
}

.header p {
    font-size: 0.9rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.timer-section {
    display: flex;
    justify-content: center;
    margin: 20px 0;
    position: relative;
    z-index: 20;
}

.timer-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(0, 255, 255, 0.2), rgba(0, 255, 136, 0.1));
    border: 3px solid rgba(0, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1);
    transition: all 0.3s ease;
    position: relative;
}

.timer-circle:hover {
    border-color: rgba(0, 255, 255, 0.8);
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.2);
}

.timer-circle::before {
    content: '';
    position: absolute;
    top: -5px;
    left: -5px;
    right: -5px;
    bottom: -5px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(0, 255, 255, 0.3);
    animation: spin 3s linear infinite;
    z-index: -1;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

#timer {
    font-size: 3rem;
    font-weight: 700;
    color: #00ffcc;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
    line-height: 1;
}

.timer-label {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 5px;
}

.question-card {
    background: linear-gradient(135deg, rgba(0, 255, 255, 0.05), rgba(0, 255, 136, 0.05));
    border: 2px solid rgba(0, 255, 255, 0.3);
    border-radius: 20px;
    padding: 40px 30px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 20;
}

#question {
    font-size: 1.8rem;
    line-height: 1.6;
    opacity: 1;
    transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
    font-weight: 500;
    color: #e0e0e0;
    text-shadow: 0 2px 10px rgba(0, 255, 204, 0.2);
}

#question.fade-in {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    width: 100%;
    max-width: 700px;
    position: relative;
    z-index: 20;
}

.navigation-controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 400px;
    margin: 20px 0;
    position: relative;
    z-index: 20;
}

button {
    padding: 16px 20px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 15px;
    border: 2px solid;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    z-index: 20;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s;
}

button:hover::before {
    left: 100%;
}

.btn-primary {
    background: linear-gradient(135deg, #00ffcc, #00ff88);
    color: #0f0f1e;
    border-color: #00ffcc;
    box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3);
}

.btn-primary:hover {
    background: linear-gradient(135deg, #00ffdd, #00ff99);
    box-shadow: 0 8px 30px rgba(0, 255, 204, 0.5);
    transform: translateY(-3px);
    animation: glow 0.6s ease-in-out;
}

.btn-primary:active {
    transform: translateY(-1px);
}

@keyframes glow {
    0%, 100% {
        text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
    }
    50% {
        text-shadow: 0 0 20px rgba(0, 255, 204, 0.8);
    }
}

.btn-secondary {
    background: linear-gradient(135deg, #1a0033, #330066);
    color: #00ffcc;
    border-color: #00ffcc;
    box-shadow: 0 4px 20px rgba(0, 255, 204, 0.2);
}

.btn-secondary:hover {
    background: linear-gradient(135deg, #240044, #440088);
    color: #00ffdd;
    border-color: #00ffdd;
    box-shadow: 0 8px 30px rgba(0, 255, 204, 0.4);
    transform: translateY(-3px);
}

.btn-secondary:active {
    transform: translateY(-1px);
}

.btn-danger {
    background: linear-gradient(135deg, #ff0055, #ff3377);
    color: white;
    border-color: #ff0055;
    box-shadow: 0 4px 20px rgba(255, 0, 85, 0.3);
}

.btn-danger:hover {
    background: linear-gradient(135deg, #ff1166, #ff4488);
    box-shadow: 0 8px 30px rgba(255, 0, 85, 0.5);
    transform: translateY(-3px);
}

.btn-danger:active {
    transform: translateY(-1px);
}

.btn-timer {
    background: linear-gradient(135deg, #ff9500, #ffb700);
    color: #0f0f1e;
    border-color: #ff9500;
    box-shadow: 0 4px 20px rgba(255, 149, 0, 0.3);
}

.btn-timer:hover {
    background: linear-gradient(135deg, #ffaa00, #ffc700);
    box-shadow: 0 8px 30px rgba(255, 149, 0, 0.5);
    transform: translateY(-3px);
}

.btn-timer:active {
    transform: translateY(-1px);
}

.btn-fullscreen {
    background: linear-gradient(135deg, #6600ff, #9900ff);
    color: white;
    border-color: #6600ff;
    box-shadow: 0 4px 20px rgba(102, 0, 255, 0.3);
}

.btn-fullscreen:hover {
    background: linear-gradient(135deg, #7700ff, #aa00ff);
    box-shadow: 0 8px 30px rgba(102, 0, 255, 0.5);
    transform: translateY(-3px);
}

.btn-fullscreen:active {
    transform: translateY(-1px);
}

/* Responsive Design */
@media (max-width: 768px) {
    .header h1 {

@media (max-width: 480px) {

    }

    .timer-circle {

        height: 100px;
    }

    #timer {
        font-size: 2rem;
    }

    .button-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    button {
        padding: 12px 12px;
        font-size: 0.8rem;
        border-radius: 12px;
    }
}

audio {
    display: none;
}
</style>

<script>

// ====== التايمر ======
let time = 30;
let timerInterval;

function startTimer() {
    clearInterval(timerInterval);
    time = 30;
    document.getElementById("timer").innerText = time;

    timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time;

        if (time <= 0) {
            clearInterval(timerInterval);
            beep();
        }
    }, 1000);
}

function beep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";        // شكل الصوت
        osc.frequency.value = 800; // النغمة (غيّرها لو تبي)
        gain.gain.value = 0.2;     // مستوى الصوت

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.3); // مدة الصوت 0.3 ثانية
    } catch (e) {
        console.log("الصوت ما اشتغل:", e);
    }
}

// ====== ملء الشاشة ======
function toggleFullscreen() {
    const elem = document.documentElement;
    const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;

    if (!isFullscreen) {
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.mozRequestFullScreen) {
            elem.mozRequestFullScreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    }
}

// ====== دالة لخلط العناصر عشوائياً (Shuffle) ======
function shuffleArray(arr) {
    let shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

// دالة عرض السؤال مع تأثير الرفاهية
function show(q) {
    let qDiv = document.getElementById("question");
    qDiv.style.opacity = '0';
    qDiv.style.transform = 'translateY(15px) scale(0.95)';
    setTimeout(() => {
        qDiv.innerText = q;
        qDiv.classList.add('fade-in');
        qDiv.style.opacity = '1';
        qDiv.style.transform = 'translateY(0) scale(1)';
        setTimeout(() => {
            qDiv.classList.remove('fade-in');
        }, 600);
    }, 10);
}

        }
        currentIndex++;

    show(shuffledA[currentIndex]);
}

// الحصول على السؤال السابق

    } else {

    }
    
    if (currentIndex <= 0) {
        show("هذا أول سؤال! 🎯");
        return;
    }
    
    currentIndex--;
    show(arr[currentIndex]);
}
